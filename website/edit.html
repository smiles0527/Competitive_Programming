<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Editorial workspace</title>
    <link rel="stylesheet" href="cms.css" />
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  </head>
  <body class="editor-workspace-page">
    <header class="topbar">
      <a class="brand" href="index.html">Editorial workspace</a>
      <span id="identity" class="muted"></span>
      <span class="spacer"></span>
      <a id="moderate-link" href="manage.html" hidden>Moderate</a>
      <a class="topbar-button" href="index.html">Exit</a>
      <button id="logout" hidden>Sign out</button>
    </header>

    <section id="auth-gate" class="auth-gate">
      <h1>Write with your GitHub identity</h1>
      <p class="muted">
        Contributors keep private drafts, submit revisions for review, and
        publish only after an editor approves them.
      </p>
      <button id="login" class="primary">Continue with GitHub</button>
    </section>

    <main id="app" class="app" hidden>
      <div class="editor-layout">
        <aside class="sidebar">
          <h2>Your editorials</h2>
          <div class="stack">
            <label
              >Collection
              <select id="collection"></select
            ></label>
            <label
              >Section
              <select id="section"></select
            ></label>
            <label
              >Problem
              <select id="problem"></select
            ></label>
            <button id="create">Create editorial</button>
          </div>
          <div id="drafts" class="draft-list"></div>
        </aside>

        <section class="editor">
          <div class="toolbar">
            <span id="editorial-status" class="badge">No draft selected</span>
            <input
              id="summary"
              maxlength="500"
              placeholder="Revision summary"
            />
            <button id="save" class="primary" disabled>Save revision</button>
            <button id="submit" disabled>Submit for review</button>
          </div>
          <div class="tabs">
            <button id="markdown-tab" class="active">Editorial Markdown</button>
            <button id="code-tab">C++ solution</button>
          </div>
          <textarea
            id="markdown"
            spellcheck="true"
            placeholder="# Editorial"
          ></textarea>
          <textarea id="code" spellcheck="false" hidden></textarea>
          <div id="status" class="status"></div>
        </section>

        <aside class="preview">
          <h2>Live preview</h2>
          <article id="preview"></article>
          <div class="reviews">
            <h2>Review history</h2>
            <div id="reviews" class="muted">No reviews yet.</div>
          </div>
        </aside>
      </div>
    </main>

    <div
      id="editorial-menu"
      class="context-menu"
      role="menu"
      aria-label="Editorial actions"
      hidden
    ></div>

    <dialog id="editorial-dialog" class="editorial-dialog">
      <form id="editorial-dialog-form">
        <h2 id="editorial-dialog-title"></h2>
        <p id="editorial-dialog-description" class="muted"></p>
        <label id="editorial-dialog-field">
          <span id="editorial-dialog-label"></span>
          <input id="editorial-dialog-input" autocomplete="off" />
          <select id="editorial-dialog-select"></select>
        </label>
        <p
          id="editorial-dialog-error"
          class="status error"
          aria-live="polite"
        ></p>
        <div class="dialog-actions">
          <button id="editorial-dialog-cancel" type="button">Cancel</button>
          <button id="editorial-dialog-confirm" type="submit" class="primary">
            Confirm
          </button>
        </div>
      </form>
    </dialog>

    <script src="site-config.js?v=4"></script>
    <script src="api.js?v=4"></script>
    <script>
      const $ = (id) => document.getElementById(id);
      const state = {
        user: null,
        problems: [],
        items: [],
        current: null,
        menuItem: null,
        creating: false,
        dirty: false,
      };
      const fields = {
        markdown: $("markdown"),
        code: $("code"),
        summary: $("summary"),
      };

      function setStatus(message, type = "") {
        $("status").textContent = message;
        $("status").className = `status ${type}`;
      }

      function markDirty() {
        state.dirty = true;
        $("save").disabled = !state.current && !$("markdown").value.trim();
        renderPreview();
      }

      function renderPreview() {
        $("preview").innerHTML = marked.parse(
          $("markdown").value || "*Start writing to see a preview.*",
        );
      }

      function populateSelectors() {
        const collections = [
          ...new Map(
            state.problems.map((p) => [p.collection, p.collection_label]),
          ).entries(),
        ];
        $("collection").replaceChildren(
          ...collections.map(([id, label]) => new Option(label, id)),
        );
        const requested = new URLSearchParams(location.search);
        $("collection").value =
          requested.get("collection") || collections[0]?.[0] || "";
        populateSections(requested.get("section"));
      }

      function populateSections(preferred = "") {
        const problems = state.problems.filter(
          (p) => p.collection === $("collection").value,
        );
        const sections = [
          ...new Map(
            problems.map((p) => [p.section, p.section_label]),
          ).entries(),
        ];
        $("section").replaceChildren(
          ...sections.map(([id, label]) => new Option(label, id)),
        );
        $("section").value = preferred || sections[0]?.[0] || "";
        populateProblems();
      }

      function populateProblems() {
        const problems = state.problems.filter(
          (p) =>
            p.collection === $("collection").value &&
            p.section === $("section").value,
        );
        $("problem").replaceChildren(
          ...problems.map((p) => new Option(p.title, p.id)),
        );
      }

      function renderDrafts() {
        $("drafts").replaceChildren();
        if (!state.items.length) {
          $("drafts").innerHTML = '<p class="muted">No editorials yet.</p>';
          return;
        }
        for (const item of state.items) {
          const row = document.createElement("div");
          row.className = "draft-row";
          row.dataset.editorialId = item.id;
          row.addEventListener("contextmenu", (event) => {
            event.preventDefault();
            openContextMenu(item, { x: event.clientX, y: event.clientY });
          });

          const button = document.createElement("button");
          button.className = `draft ${state.current?.id === item.id ? "active" : ""}`;
          button.innerHTML = `<strong></strong><span></span>`;
          button.querySelector("strong").textContent = item.title;
          button.querySelector("span").textContent =
            `${item.section_label} · ${item.status.replaceAll("_", " ")}`;
          button.addEventListener("click", () => openEditorial(item.id));
          button.addEventListener("keydown", (event) => {
            if (
              event.key === "ContextMenu" ||
              (event.shiftKey && event.key === "F10")
            ) {
              event.preventDefault();
              const box = button.getBoundingClientRect();
              openContextMenu(item, { x: box.left + 20, y: box.top + 20 });
            }
          });

          const more = document.createElement("button");
          more.type = "button";
          more.className = "draft-more";
          more.textContent = "•••";
          more.setAttribute("aria-label", `Actions for ${item.title}`);
          more.addEventListener("click", (event) => {
            event.stopPropagation();
            const box = more.getBoundingClientRect();
            openContextMenu(item, { x: box.right, y: box.bottom });
          });

          row.append(button, more);
          $("drafts").appendChild(row);
        }
      }

      function isStaff() {
        return ["owner", "editor"].includes(state.user?.role);
      }

      function ownsEditorial(item) {
        return Number(item.created_by) === Number(state.user?.id);
      }

      function publicEditorialUrl(item) {
        const query = new URLSearchParams({
          collection: item.collection,
          section: item.section,
          slug: item.slug,
        });
        return new URL(`section.html?${query}`, location.href).toString();
      }

      function contextActions(item) {
        const editable = isStaff() || ownsEditorial(item);
        const publiclyVisible =
          item.published_revision_id && item.status !== "archived";
        const owner = state.user?.role === "owner";
        const actions = [
          ["open", "Open"],
          publiclyVisible && ["public", "Open public version"],
          publiclyVisible && ["copy-link", "Copy public link"],
          null,
          editable && item.status !== "archived" && ["rename", "Rename"],
          ["duplicate", "Duplicate"],
          editable && item.status !== "archived" && ["move", "Move to problem"],
          null,
          !owner &&
            editable &&
            ["draft", "changes_requested"].includes(item.status) && [
              "submit",
              "Submit for review",
            ],
          !owner && editable && item.status === "submitted" && [
            "withdraw",
            "Withdraw from review",
          ],
          owner &&
            item.status !== "archived" &&
            (item.status !== "published" ||
              item.current_revision_id !== item.published_revision_id) && [
              "publish",
              "Publish now",
            ],
          isStaff() &&
            item.status !== "archived" && ["archive", "Move to archive"],
          isStaff() && item.status === "archived" && ["restore", "Restore"],
          null,
          editable &&
            (state.user.role === "owner" || !item.published_revision_id) && [
              "delete",
              "Delete permanently",
              "danger",
            ],
        ];
        const cleaned = [];
        for (const action of actions) {
          if (action) {
            cleaned.push(action);
          } else if (
            action === null &&
            cleaned.length &&
            cleaned.at(-1) !== null
          ) {
            cleaned.push(null);
          }
        }
        while (cleaned.at(-1) === null) cleaned.pop();
        return cleaned;
      }

      function closeContextMenu({ restoreFocus = false } = {}) {
        const menu = $("editorial-menu");
        const trigger = menu._trigger;
        menu.hidden = true;
        menu.replaceChildren();
        state.menuItem = null;
        if (restoreFocus) trigger?.focus();
      }

      function openContextMenu(item, point) {
        const menu = $("editorial-menu");
        closeContextMenu();
        state.menuItem = item;
        menu._trigger = document.activeElement;

        for (const action of contextActions(item)) {
          if (!action) {
            const separator = document.createElement("div");
            separator.className = "context-menu-separator";
            separator.setAttribute("role", "separator");
            menu.appendChild(separator);
            continue;
          }
          const [name, label, tone] = action;
          const button = document.createElement("button");
          button.type = "button";
          button.role = "menuitem";
          button.dataset.action = name;
          button.textContent = label;
          if (tone) button.classList.add(tone);
          button.addEventListener("click", () => runContextAction(name, item));
          menu.appendChild(button);
        }

        menu.hidden = false;
        menu.style.left = "0px";
        menu.style.top = "0px";
        const box = menu.getBoundingClientRect();
        const margin = 8;
        const left = Math.max(
          margin,
          Math.min(point.x, innerWidth - box.width - margin),
        );
        const top = Math.max(
          margin,
          Math.min(point.y, innerHeight - box.height - margin),
        );
        menu.style.left = `${left}px`;
        menu.style.top = `${top}px`;
        menu.querySelector('[role="menuitem"]')?.focus();
      }

      let dialogResolve = null;

      function finishDialog(value) {
        const resolve = dialogResolve;
        dialogResolve = null;
        $("editorial-dialog").close();
        resolve?.(value);
      }

      function showEditorialDialog({
        title,
        description = "",
        label = "",
        value = "",
        confirmLabel = "Confirm",
        danger = false,
        options = null,
        validate = null,
      }) {
        const dialog = $("editorial-dialog");
        $("editorial-dialog-title").textContent = title;
        $("editorial-dialog-description").textContent = description;
        $("editorial-dialog-description").hidden = !description;
        $("editorial-dialog-label").textContent = label;
        $("editorial-dialog-error").textContent = "";

        const field = $("editorial-dialog-field");
        const input = $("editorial-dialog-input");
        const select = $("editorial-dialog-select");
        field.hidden = !label && !options;
        input.hidden = Boolean(options);
        select.hidden = !options;
        if (options) {
          select.replaceChildren(
            ...options.map(
              (option) => new Option(option.label, String(option.value)),
            ),
          );
          select.value = String(value);
        } else {
          input.value = value;
        }

        const confirm = $("editorial-dialog-confirm");
        confirm.textContent = confirmLabel;
        confirm.className = danger ? "danger solid" : "primary";
        dialog._validate = validate;
        dialog.showModal();
        setTimeout(
          () => (field.hidden ? confirm : options ? select : input).focus(),
          0,
        );
        return new Promise((resolve) => {
          dialogResolve = resolve;
        });
      }

      async function refreshAfterAction(id = null) {
        state.dirty = false;
        state.creating = false;
        await refreshDashboard();
        const next = id
          ? state.items.find((item) => item.id === id)
          : state.items[0];
        if (next) await openEditorial(next.id);
        else {
          state.current = null;
          fields.markdown.value = "";
          fields.code.value = "";
          $("editorial-status").textContent = "No draft selected";
          $("save").disabled = true;
          $("submit").disabled = true;
          renderPreview();
          renderDrafts();
          history.replaceState(null, "", "edit.html");
        }
      }

      async function saveCurrentBeforeAction(item) {
        if (state.current?.id !== item.id || !state.dirty) return true;
        return saveRevision();
      }

      async function runContextAction(action, item) {
        closeContextMenu();
        try {
          if (action === "open") return openEditorial(item.id);
          if (action === "public") {
            location.href = publicEditorialUrl(item);
            return;
          }
          if (action === "copy-link") {
            await navigator.clipboard.writeText(publicEditorialUrl(item));
            setStatus("Public link copied.", "success");
            return;
          }

          if (action === "rename") {
            const title = await showEditorialDialog({
              title: "Rename editorial",
              label: "Editorial name",
              value: item.title,
              confirmLabel: "Rename",
              validate: (value) =>
                value.trim() ? "" : "Enter an editorial name.",
            });
            if (title === null) return;
            await EditorialApi.request(`/api/editorials/${item.id}`, {
              method: "PATCH",
              body: JSON.stringify({ title }),
            });
            await refreshDashboard();
            if (state.current?.id === item.id) state.current.title = title.trim();
            renderDrafts();
            setStatus("Editorial renamed.", "success");
            return;
          }

          if (action === "move") {
            if (!(await saveCurrentBeforeAction(item))) return;
            const problemId = await showEditorialDialog({
              title: "Move editorial",
              description:
                "The editorial will belong to the selected problem. Its saved revisions are unchanged.",
              label: "Problem",
              value: item.problem_id,
              confirmLabel: "Move",
              options: state.problems.map((problem) => ({
                value: problem.id,
                label: `${problem.collection_label} / ${problem.section_label} / ${problem.title}`,
              })),
            });
            if (problemId === null || Number(problemId) === item.problem_id)
              return;
            await EditorialApi.request(`/api/editorials/${item.id}`, {
              method: "PATCH",
              body: JSON.stringify({ problem_id: Number(problemId) }),
            });
            await refreshAfterAction(item.id);
            setStatus("Editorial moved.", "success");
            return;
          }

          if (action === "duplicate") {
            if (!(await saveCurrentBeforeAction(item))) return;
            const result = await EditorialApi.request(
              `/api/editorials/${item.id}/duplicate`,
              { method: "POST" },
            );
            await refreshAfterAction(result.editorial.id);
            setStatus("Draft duplicated.", "success");
            return;
          }

          if (action === "submit") {
            if (state.current?.id !== item.id) await openEditorial(item.id);
            await submit();
            return;
          }

          if (action === "withdraw") {
            if (!(await saveCurrentBeforeAction(item))) return;
            await EditorialApi.request(`/api/editorials/${item.id}/withdraw`, {
              method: "POST",
            });
            await refreshAfterAction(item.id);
            setStatus("Editorial withdrawn.", "success");
            return;
          }

          if (action === "publish") {
            if (!(await saveCurrentBeforeAction(item))) return;
            await EditorialApi.request(
              `/api/editorials/${item.id}/publish`,
              { method: "POST" },
            );
            await refreshAfterAction(item.id);
            setStatus("Editorial published.", "success");
            return;
          }

          if (action === "archive" || action === "restore") {
            const restoring = action === "restore";
            if (!restoring && !(await saveCurrentBeforeAction(item))) return;
            await EditorialApi.request(
              `/api/editorials/${item.id}/${action}`,
              { method: "POST" },
            );
            await refreshAfterAction(item.id);
            setStatus(restoring ? "Editorial restored." : "Editorial archived.", "success");
            return;
          }

          if (action === "delete") {
            await EditorialApi.request(`/api/editorials/${item.id}`, {
              method: "DELETE",
            });
            await refreshAfterAction();
            setStatus("Editorial deleted.", "success");
          }
        } catch (error) {
          setStatus(error.message, "error");
        }
      }

      async function refreshDashboard() {
        const [dashboard, problems] = await Promise.all([
          EditorialApi.request("/api/dashboard"),
          EditorialApi.request("/api/problems"),
        ]);
        state.user = dashboard.user;
        state.items = dashboard.items;
        state.problems = problems.items;
        $("identity").textContent =
          `${state.user.display_name || state.user.login} · ${state.user.role}`;
        $("moderate-link").hidden = !["owner", "editor"].includes(
          state.user.role,
        );
        const owner = state.user.role === "owner";
        $("save").textContent = owner ? "Save live" : "Save revision";
        $("submit").hidden = owner;
        $("logout").hidden = false;
        populateSelectors();
        renderDrafts();
      }

      async function openEditorial(id) {
        if (state.dirty && !(await saveRevision())) return;
        const result = await EditorialApi.request(`/api/editorials/${id}`);
        state.current = result.editorial;
        state.creating = false;
        const current = result.revisions.find(
          (revision) => revision.id === result.editorial.current_revision_id,
        );
        fields.markdown.value = current?.markdown || "";
        fields.code.value = current?.solution_cpp || "";
        fields.summary.value = "";
        state.dirty = false;
        $("editorial-status").textContent = result.editorial.status.replaceAll(
          "_",
          " ",
        );
        $("editorial-status").className = `badge ${result.editorial.status}`;
        $("save").disabled = true;
        $("submit").disabled = !["draft", "changes_requested"].includes(
          result.editorial.status,
        );
        $("reviews").replaceChildren();
        if (!result.reviews.length)
          $("reviews").textContent = "No reviews yet.";
        for (const review of result.reviews) {
          const item = document.createElement("div");
          item.className = "review";
          item.innerHTML = `<strong></strong><span class="badge"></span><p></p>`;
          item.querySelector("strong").textContent = review.reviewer_name;
          item.querySelector(".badge").textContent = review.decision.replaceAll(
            "_",
            " ",
          );
          item.querySelector("p").textContent = review.comment || "No comment.";
          $("reviews").appendChild(item);
        }
        renderPreview();
        renderDrafts();
        history.replaceState(null, "", `edit.html?id=${id}`);
      }

      async function createEditorial() {
        if (state.dirty && !(await saveRevision())) return;
        const problemId = Number($("problem").value);
        if (!problemId) return;
        const problem = state.problems.find((item) => item.id === problemId);
        const markdown = `# ${problem.title}\n\n## Idea\n\nExplain the central observation.\n\n## Algorithm\n\n1. Describe the steps.\n\n## Correctness\n\nProve that the algorithm returns the required result.\n\n## Complexity\n\nState the time and memory complexity.\n`;
        setStatus("Creating draft…");
        try {
          if (state.user.role === "owner") {
            state.current = {
              id: null,
              problem_id: problemId,
              title: problem.title,
              status: "new",
            };
            state.creating = true;
            state.dirty = true;
            fields.markdown.value = markdown;
            fields.code.value = "";
            fields.summary.value = "Initial editorial";
            $("editorial-status").textContent = "new editorial";
            $("editorial-status").className = "badge";
            $("save").disabled = false;
            $("reviews").textContent = "No reviews yet.";
            setStatus("Write the editorial, then Save live.", "success");
            renderPreview();
            renderDrafts();
            history.replaceState(null, "", "edit.html");
            return;
          }
          const result = await EditorialApi.request("/api/editorials", {
            method: "POST",
            body: JSON.stringify({
              problem_id: problemId,
              markdown,
              solution_cpp: "",
              summary: "Initial draft",
            }),
          });
          await refreshDashboard();
          await openEditorial(result.editorial.id);
          setStatus("Draft created.", "success");
        } catch (error) {
          setStatus(error.message, "error");
        }
      }

      async function saveRevision() {
        if (!state.current) return false;
        $("save").disabled = true;
        setStatus("Saving revision…");
        try {
          const result = state.creating
            ? await EditorialApi.request("/api/editorials", {
                method: "POST",
                body: JSON.stringify({
                  problem_id: state.current.problem_id,
                  markdown: fields.markdown.value,
                  solution_cpp: fields.code.value,
                  summary: fields.summary.value || "Initial editorial",
                  publish: state.user.role === "owner",
                }),
              })
            : await EditorialApi.request(
                `/api/editorials/${state.current.id}`,
                {
                  method: "PUT",
                  body: JSON.stringify({
                    markdown: fields.markdown.value,
                    solution_cpp: fields.code.value,
                    summary: fields.summary.value || "Updated editorial",
                  }),
                },
              );
          state.dirty = false;
          state.creating = false;
          const editorialId = result.editorial.id;
          await refreshDashboard();
          await openEditorial(editorialId);
          setStatus(
            state.user.role === "owner"
              ? "Saved and published."
              : "Revision saved.",
            "success",
          );
          return true;
        } catch (error) {
          $("save").disabled = false;
          setStatus(error.message, "error");
          return false;
        }
      }

      async function submit() {
        if (state.dirty && !(await saveRevision())) return;
        if (!state.current) return;
        try {
          await EditorialApi.request(
            `/api/editorials/${state.current.id}/submit`,
            { method: "POST" },
          );
          await refreshDashboard();
          await openEditorial(state.current.id);
          setStatus("Submitted for review.", "success");
        } catch (error) {
          setStatus(error.message, "error");
        }
      }

      function selectTab(name) {
        const markdown = name === "markdown";
        $("markdown").hidden = !markdown;
        $("code").hidden = markdown;
        $("markdown-tab").classList.toggle("active", markdown);
        $("code-tab").classList.toggle("active", !markdown);
      }

      async function initialize() {
        if (!EditorialApi.hasSession()) return;
        try {
          await refreshDashboard();
          $("auth-gate").hidden = true;
          $("app").hidden = false;
          const requestedId = Number(
            new URLSearchParams(location.search).get("id"),
          );
          if (requestedId) await openEditorial(requestedId);
          else if (state.items[0]) await openEditorial(state.items[0].id);
          else renderPreview();
        } catch (error) {
          if (error.status === 401) return EditorialApi.logout();
          $("auth-gate").innerHTML =
            `<h1>Unable to load the workspace</h1><p></p>`;
          $("auth-gate").querySelector("p").textContent = error.message;
        }
      }

      $("login").addEventListener("click", () =>
        EditorialApi.login(location.href),
      );
      $("logout").addEventListener("click", EditorialApi.logout);
      $("collection").addEventListener("change", () => populateSections());
      $("section").addEventListener("change", populateProblems);
      $("create").addEventListener("click", createEditorial);
      $("save").addEventListener("click", saveRevision);
      $("submit").addEventListener("click", submit);
      $("markdown-tab").addEventListener("click", () => selectTab("markdown"));
      $("code-tab").addEventListener("click", () => selectTab("code"));
      $("editorial-dialog-cancel").addEventListener("click", () =>
        finishDialog(null),
      );
      $("editorial-dialog").addEventListener("cancel", (event) => {
        event.preventDefault();
        finishDialog(null);
      });
      $("editorial-dialog-form").addEventListener("submit", (event) => {
        event.preventDefault();
        const field = $("editorial-dialog-field");
        const value = field.hidden
          ? true
          : $("editorial-dialog-select").hidden
            ? $("editorial-dialog-input").value
            : $("editorial-dialog-select").value;
        const error = $("editorial-dialog")._validate?.(value) || "";
        $("editorial-dialog-error").textContent = error;
        if (!error) finishDialog(value);
      });
      $("editorial-menu").addEventListener("keydown", (event) => {
        const items = [
          ...$("editorial-menu").querySelectorAll('[role="menuitem"]'),
        ];
        const current = items.indexOf(document.activeElement);
        let next = null;
        if (event.key === "ArrowDown")
          next = items[(current + 1) % items.length];
        if (event.key === "ArrowUp")
          next = items[(current - 1 + items.length) % items.length];
        if (event.key === "Home") next = items[0];
        if (event.key === "End") next = items.at(-1);
        if (event.key === "Escape") {
          event.preventDefault();
          closeContextMenu({ restoreFocus: true });
          return;
        }
        if (next) {
          event.preventDefault();
          next.focus();
        }
      });
      addEventListener("pointerdown", (event) => {
        const menu = $("editorial-menu");
        if (!menu.hidden && !menu.contains(event.target)) closeContextMenu();
      });
      addEventListener("resize", () => closeContextMenu());
      addEventListener("scroll", () => closeContextMenu(), true);
      for (const field of Object.values(fields))
        field.addEventListener("input", markDirty);
      addEventListener("keydown", (event) => {
        if (
          (event.ctrlKey || event.metaKey) &&
          event.key.toLowerCase() === "s"
        ) {
          event.preventDefault();
          saveRevision();
        }
      });
      initialize();
    </script>
  </body>
</html>
