<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Find an editorial · CP Editorials</title>
    <link rel="stylesheet" href="site.css?v=6" />
  </head>
  <body>
    <header class="site-header" data-site-nav data-active="find">
      <div class="site-header-inner">
        <a class="site-brand" href="index.html">
          <span class="site-brand-mark">CP</span>
          <span>Editorials</span>
        </a>
        <nav class="site-nav" aria-label="Primary navigation">
          <a href="index.html">Home</a>
          <a href="all.html" data-nav="find">Find</a>
          <a href="edit.html">Write</a>
          <a href="manage.html" data-review-link hidden>Review</a>
        </nav>
        <div class="site-account">
          <span class="site-identity" data-identity hidden></span>
          <button type="button" data-sign-in>Sign in</button>
          <button type="button" data-sign-out hidden>Sign out</button>
        </div>
      </div>
    </header>

    <main class="simple-catalog">
      <div class="catalog-toolbar">
        <select id="collection" aria-label="Collection"></select>
        <select id="section" aria-label="Section"></select>
        <input
          id="search"
          type="search"
          autocomplete="off"
          placeholder="Search editorials"
          aria-label="Search editorials"
        />
      </div>
      <div id="catalog" class="catalog-grid">Loading…</div>
    </main>

    <script src="site-config.js?v=6"></script>
    <script src="api.js?v=6"></script>
    <script src="site-nav.js?v=6"></script>
    <script>
      const collectionPicker = document.getElementById("collection");
      const sectionPicker = document.getElementById("section");
      const search = document.getElementById("search");
      const catalog = document.getElementById("catalog");
      let problems = [];

      function uniqueProblems(items) {
        const grouped = new Map();
        for (const item of items) {
          const key = `${item.collection}|${item.section}|${item.slug}`;
          if (!grouped.has(key)) {
            grouped.set(key, {
              collection: item.collection,
              collectionLabel: item.collection_label,
              section: item.section,
              sectionLabel: item.section_label,
              title: item.title,
              slug: item.slug,
              editorialCount: 0,
            });
          }
          grouped.get(key).editorialCount++;
        }
        return [...grouped.values()];
      }

      function populateCollections(preferred = "", preferredSection = "") {
        const collections = [
          ...new Map(
            problems.map((item) => [
              item.collection,
              item.collectionLabel,
            ]),
          ).entries(),
        ];
        collectionPicker.replaceChildren(
          new Option("All collections", ""),
          ...collections.map(([id, label]) => new Option(label, id)),
        );
        collectionPicker.value = preferred;
        populateSections(preferredSection);
      }

      function populateSections(preferred = "") {
        const scoped = collectionPicker.value
          ? problems.filter(
              (item) => item.collection === collectionPicker.value,
            )
          : problems;
        const sections = new Map();
        for (const item of scoped) {
          const value = collectionPicker.value
            ? item.section
            : `${item.collection}|${item.section}`;
          const label = collectionPicker.value
            ? item.sectionLabel
            : `${item.collectionLabel} · ${item.sectionLabel}`;
          if (!sections.has(value)) sections.set(value, label);
        }
        sectionPicker.replaceChildren(
          new Option("All sections", ""),
          ...[...sections].map(
            ([value, label]) => new Option(label, value),
          ),
        );
        sectionPicker.value = preferred;
        render();
      }

      function render() {
        const query = search.value.trim().toLowerCase();
        const visible = problems.filter((item) => {
          if (
            collectionPicker.value &&
            item.collection !== collectionPicker.value
          )
            return false;
          const sectionValue = collectionPicker.value
            ? item.section
            : `${item.collection}|${item.section}`;
          if (sectionPicker.value && sectionValue !== sectionPicker.value)
            return false;
          return `${item.title} ${item.collectionLabel} ${item.sectionLabel}`
            .toLowerCase()
            .includes(query);
        });
        catalog.replaceChildren();
        catalog.className = visible.length ? "catalog-grid" : "catalog-empty";
        if (!visible.length) {
          catalog.textContent = "No editorials found.";
          return;
        }
        for (const item of visible) {
          const link = document.createElement("a");
          link.className = "catalog-button";
          link.href = `section.html?${new URLSearchParams({
            collection: item.collection,
            section: item.section,
            slug: item.slug,
          })}`;
          link.innerHTML =
            "<span class='catalog-button-title'></span><span class='catalog-button-meta'></span><span class='catalog-button-arrow'>→</span>";
          link.querySelector(".catalog-button-title").textContent =
            item.title;
          link.querySelector(".catalog-button-meta").textContent =
            `${item.collectionLabel} · ${item.sectionLabel}${
              item.editorialCount > 1
                ? ` · ${item.editorialCount} editorials`
                : ""
            }`;
          catalog.appendChild(link);
        }
      }

      async function initialize() {
        const result = await EditorialApi.request("/api/catalog");
        problems = uniqueProblems(result.items);
        const params = new URLSearchParams(location.search);
        search.value = params.get("q") || "";
        populateCollections(
          params.get("collection") || "",
          params.get("section") || "",
        );
      }

      collectionPicker.addEventListener("change", () => populateSections());
      sectionPicker.addEventListener("change", render);
      search.addEventListener("input", render);
      initialize().catch((error) => {
        catalog.className = "catalog-empty";
        catalog.textContent = error.message;
      });
    </script>
  </body>
</html>
