<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script>
    window.MathJax = {
      tex: { inlineMath: [['$', '$']], displayMath: [['$$', '$$']] },
      options: { skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code'] }
    };
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.10.0/build/styles/github.min.css">
  <script defer src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.10.0/build/highlight.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
  <style>
    :root { --ink:#171717; --muted:#777; --line:#e4e4e4; --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif; --serif:Georgia,"Times New Roman",serif; }
    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; }
    body { color: var(--ink); background: #fff; font: 15px/1.72 var(--sans); }
    main { width: min(760px, calc(100% - 54px)); margin: 0 auto; padding: 58px 0 100px; }
    h1, h2, h3 { color: #111; }
    h1 { margin: 0 0 40px; font: 600 38px/1.15 var(--serif); letter-spacing: -.5px; }
    h2 { margin: 48px 0 14px; padding-top: 20px; border-top: 1px solid var(--line); font: 600 23px/1.3 var(--serif); }
    h3 { margin: 30px 0 10px; font-size: 16px; }
    p, ul, ol { margin: 12px 0; }
    a { color: #205faf; }
    code { padding: 2px 4px; background: #f3f3f1; font: 12.5px/1.5 "SFMono-Regular",Consolas,monospace; }
    pre { overflow: auto; margin: 20px 0; padding: 18px; background: #f7f7f5; border: 1px solid var(--line); }
    pre code { padding: 0; background: transparent; }
    blockquote { margin: 22px 0; padding-left: 18px; border-left: 2px solid #bbb; color: #555; }
    table { width: 100%; margin: 24px 0; border-collapse: collapse; font-size: 13px; }
    th, td { padding: 9px 12px; border-bottom: 1px solid var(--line); text-align: left; }
    .empty { color: var(--muted); }
    @media (max-width: 620px) { main { width: calc(100% - 34px); padding-top: 36px; } h1 { font-size: 30px; } }
  </style>
</head>
<body>
  <main id="content" class="empty">Select an editorial to begin.</main>
  <script>
    let pending = null;
    async function draw(payload) {
      if (!window.marked || !window.hljs || !window.MathJax?.typesetPromise) {
        pending = payload;
        return;
      }
      pending = null;
      const content = document.getElementById('content');
      content.classList.remove('empty');
      content.innerHTML = marked.parse(payload.markdown || '');
      const heading = [...content.querySelectorAll('h3')].find(node => node.textContent.trim() === 'Accepted C++17 implementation');
      if (heading) {
        const pre = heading.nextElementSibling;
        if (pre?.tagName === 'PRE') pre.remove();
        heading.remove();
      }
      content.querySelectorAll('pre code').forEach(node => hljs.highlightElement(node));
      MathJax.typesetClear([content]);
      await MathJax.typesetPromise([content]);
    }
    addEventListener('message', event => { if (event.data?.type === 'render') draw(event.data); });
    addEventListener('load', () => { if (pending) draw(pending); });
    setInterval(() => { if (pending && window.marked && window.hljs && window.MathJax?.typesetPromise) draw(pending); }, 150);
  </script>
</body>
</html>
