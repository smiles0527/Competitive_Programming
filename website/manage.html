<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Editorial moderation</title>
    <link rel="stylesheet" href="cms.css" />
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="index.html">Editorial moderation</a>
      <span id="identity" class="muted"></span>
      <span class="spacer"></span>
      <a href="edit.html">Write</a>
      <button id="export" hidden>Export backup</button>
      <button id="logout" hidden>Sign out</button>
    </header>

    <section id="auth-gate" class="auth-gate">
      <h1>Editor access</h1>
      <p class="muted">
        Sign in with an editor or owner account to review contributed
        editorials.
      </p>
      <button id="login" class="primary">Continue with GitHub</button>
    </section>

    <main id="console" class="console" hidden>
      <h1>Review queue</h1>
      <div id="metrics" class="metrics"></div>
      <div class="toolbar">
        <select id="status-filter">
          <option value="">All statuses</option>
          <option value="submitted" selected>Submitted</option>
          <option value="changes_requested">Changes requested</option>
          <option value="draft">Draft</option>
          <option value="published">Published</option>
          <option value="archived">Archived</option>
        </select>
        <input
          id="search"
          type="search"
          placeholder="Search problems or authors"
        />
        <button id="refresh">Refresh</button>
      </div>
      <div id="queue" class="queue"></div>

      <section id="review-panel" class="review-panel" hidden>
        <article class="review-content">
          <h2 id="review-title"></h2>
          <p id="review-meta" class="muted"></p>
          <div id="review-markdown"></div>
          <h3>C++ solution</h3>
          <pre><code id="review-code"></code></pre>
        </article>
        <aside class="review-actions">
          <h2>Review</h2>
          <div id="review-history"></div>
          <label>
            Comment
            <textarea
              id="comment"
              placeholder="Give the author specific, actionable feedback."
            ></textarea>
          </label>
          <div class="toolbar">
            <button data-decision="comment">Add comment</button>
            <button data-decision="request_changes">Request changes</button>
            <button data-decision="approve">Approve</button>
            <button id="publish" class="primary">
              Publish current revision
            </button>
            <button id="archive" class="danger">Archive</button>
          </div>
          <div id="status" class="status"></div>
        </aside>
      </section>

      <section id="users-section" hidden>
        <h2>People and roles</h2>
        <p class="muted">
          New GitHub users begin as contributors. Owners can promote editors.
        </p>
        <table class="users">
          <thead>
            <tr>
              <th>User</th>
              <th>Role</th>
              <th>Joined</th>
            </tr>
          </thead>
          <tbody id="users"></tbody>
        </table>
      </section>
    </main>

    <script src="site-config.js?v=4"></script>
    <script src="api.js?v=4"></script>
    <script>
      const $ = (id) => document.getElementById(id);
      const state = { user: null, items: [], current: null };

      function setStatus(message, type = "") {
        $("status").textContent = message;
        $("status").className = `status ${type}`;
      }

      function updateMetrics() {
        const counts = Object.groupBy(state.items, (item) => item.status);
        $("metrics").replaceChildren(
          ...["submitted", "changes_requested", "draft", "published"].map(
            (status) => {
              const div = document.createElement("div");
              div.className = "metric";
              div.textContent = `${counts[status]?.length || 0} ${status.replaceAll("_", " ")}`;
              return div;
            },
          ),
        );
      }

      function renderQueue() {
        const query = $("search").value.trim().toLowerCase();
        const status = $("status-filter").value;
        const visible = state.items.filter(
          (item) =>
            (!status || item.status === status) &&
            (!query ||
              `${item.title} ${item.section_label} ${item.author_name}`
                .toLowerCase()
                .includes(query)),
        );
        $("queue").replaceChildren();
        if (!visible.length) {
          $("queue").innerHTML =
            '<p class="muted">No editorials match this view.</p>';
          return;
        }
        for (const item of visible) {
          const row = document.createElement("div");
          row.className = "queue-item";
          row.innerHTML =
            "<strong></strong><span></span><span class='badge'></span><button>Open review</button>";
          row.querySelector("strong").textContent = item.title;
          row.children[1].textContent = `${item.section_label} · ${item.author_name}`;
          row.querySelector(".badge").textContent = item.status.replaceAll(
            "_",
            " ",
          );
          row.querySelector(".badge").classList.add(item.status);
          row
            .querySelector("button")
            .addEventListener("click", () => openReview(item.id));
          $("queue").appendChild(row);
        }
      }

      async function refresh() {
        const dashboard = await EditorialApi.request("/api/dashboard");
        state.user = dashboard.user;
        if (!["owner", "editor"].includes(state.user.role)) {
          throw new Error(
            "Your account is a contributor. An owner must grant editor access.",
          );
        }
        state.items = dashboard.items;
        $("identity").textContent =
          `${state.user.display_name || state.user.login} · ${state.user.role}`;
        $("logout").hidden = false;
        $("export").hidden = state.user.role !== "owner";
        updateMetrics();
        renderQueue();
        if (state.user.role === "owner") await loadUsers();
      }

      async function openReview(id) {
        const result = await EditorialApi.request(`/api/editorials/${id}`);
        state.current = result.editorial;
        const revision = result.revisions.find(
          (item) => item.id === result.editorial.current_revision_id,
        );
        $("review-title").textContent = result.editorial.title;
        $("review-meta").textContent =
          `${result.editorial.collection_label} · ${result.editorial.section_label} · ${result.editorial.author_name} · ${result.editorial.status.replaceAll("_", " ")}`;
        $("review-markdown").innerHTML = marked.parse(revision?.markdown || "");
        $("review-code").textContent =
          revision?.solution_cpp || "// No C++ solution attached.";
        $("review-history").replaceChildren();
        for (const review of result.reviews) {
          const div = document.createElement("div");
          div.className = "review";
          div.innerHTML = "<strong></strong><span class='badge'></span><p></p>";
          div.querySelector("strong").textContent = review.reviewer_name;
          div.querySelector(".badge").textContent = review.decision.replaceAll(
            "_",
            " ",
          );
          div.querySelector("p").textContent = review.comment || "No comment.";
          $("review-history").appendChild(div);
        }
        if (!result.reviews.length)
          $("review-history").innerHTML =
            '<p class="muted">No reviews yet.</p>';
        $("comment").value = "";
        $("review-panel").hidden = false;
        $("review-panel").scrollIntoView({ behavior: "smooth" });
        history.replaceState(null, "", `manage.html?id=${id}`);
      }

      async function review(decision) {
        if (!state.current) return;
        setStatus("Saving review…");
        try {
          await EditorialApi.request(
            `/api/editorials/${state.current.id}/review`,
            {
              method: "POST",
              body: JSON.stringify({ decision, comment: $("comment").value }),
            },
          );
          await refresh();
          await openReview(state.current.id);
          setStatus("Review saved.", "success");
        } catch (error) {
          setStatus(error.message, "error");
        }
      }

      async function action(name) {
        if (!state.current) return;
        if (name === "archive" && !confirm("Archive this editorial?")) return;
        setStatus(`${name === "publish" ? "Publishing" : "Archiving"}…`);
        try {
          await EditorialApi.request(
            `/api/editorials/${state.current.id}/${name}`,
            { method: "POST" },
          );
          await refresh();
          await openReview(state.current.id);
          setStatus(name === "publish" ? "Published." : "Archived.", "success");
        } catch (error) {
          setStatus(error.message, "error");
        }
      }

      async function loadUsers() {
        const result = await EditorialApi.request("/api/users");
        $("users-section").hidden = false;
        $("users").replaceChildren();
        for (const user of result.users) {
          const row = document.createElement("tr");
          const person = document.createElement("td");
          person.textContent = user.display_name || user.login;
          const roleCell = document.createElement("td");
          const select = document.createElement("select");
          for (const role of ["contributor", "editor", "owner"])
            select.add(new Option(role, role));
          select.value = user.role;
          select.disabled = user.id === state.user.id;
          select.addEventListener("change", async () => {
            try {
              await EditorialApi.request(`/api/users/${user.id}/role`, {
                method: "PUT",
                body: JSON.stringify({ role: select.value }),
              });
            } catch (error) {
              select.value = user.role;
              alert(error.message);
            }
          });
          roleCell.appendChild(select);
          const joined = document.createElement("td");
          joined.textContent = new Date(
            `${user.created_at}Z`,
          ).toLocaleDateString();
          row.append(person, roleCell, joined);
          $("users").appendChild(row);
        }
      }

      async function exportBackup() {
        const data = await EditorialApi.request("/api/export");
        const url = URL.createObjectURL(
          new Blob([JSON.stringify(data)], { type: "application/json" }),
        );
        const link = document.createElement("a");
        link.href = url;
        link.download = `editorials-${new Date().toISOString().slice(0, 10)}.json`;
        link.click();
        URL.revokeObjectURL(url);
      }

      async function initialize() {
        if (!EditorialApi.hasSession()) return;
        try {
          await refresh();
          $("auth-gate").hidden = true;
          $("console").hidden = false;
          const requested = Number(
            new URLSearchParams(location.search).get("id"),
          );
          if (requested) await openReview(requested);
        } catch (error) {
          $("auth-gate").innerHTML =
            "<h1>Access unavailable</h1><p></p><a href='edit.html'>Return to your workspace</a>";
          $("auth-gate").querySelector("p").textContent = error.message;
        }
      }

      $("login").addEventListener("click", () =>
        EditorialApi.login(location.href),
      );
      $("logout").addEventListener("click", EditorialApi.logout);
      $("refresh").addEventListener("click", refresh);
      $("search").addEventListener("input", renderQueue);
      $("status-filter").addEventListener("change", renderQueue);
      $("publish").addEventListener("click", () => action("publish"));
      $("archive").addEventListener("click", () => action("archive"));
      $("export").addEventListener("click", exportBackup);
      for (const button of document.querySelectorAll("[data-decision]")) {
        button.addEventListener("click", () => review(button.dataset.decision));
      }
      initialize();
    </script>
  </body>
</html>
