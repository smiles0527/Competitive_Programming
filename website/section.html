<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CSES Sorting and Searching Editorial Preview</title>
    <script>
      MathJax = {
        tex: { inlineMath: [["$", "$"]], displayMath: [["$$", "$$"]] },
        svg: { fontCache: "global" },
      };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.10.0/build/styles/github.min.css"
    />
    <link rel="stylesheet" href="editorial-theme.css?v=5" />
    <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.10.0/build/highlight.min.js"></script>
    <style>
      :root {
        --ink: #111;
        --muted: #9a9a9a;
        --line: #e8e8e8;
        --soft: #f6f6f6;
        --sans: -apple-system, "Segoe UI", Helvetica, Arial, sans-serif;
        --mono: "SF Mono", ui-monospace, Consolas, monospace;
      }

      * {
        box-sizing: border-box;
      }
      html {
        background: #fff;
      }
      body {
        margin: 0;
        background: #fff;
        color: var(--ink);
        font: 15px/1.72 var(--sans);
        -webkit-font-smoothing: antialiased;
      }
      .shell {
        width: min(1160px, calc(100% - 48px));
        margin: 0 auto;
      }
      .nav {
        display: flex;
        align-items: center;
        gap: 21px;
        height: 72px;
        border-bottom: 1px solid var(--line);
        color: var(--muted);
        font-size: 13px;
        letter-spacing: 0.3px;
      }
      .nav a {
        color: var(--muted);
        text-decoration: none;
      }
      .nav .brand,
      .nav a.active {
        color: var(--ink);
        font-weight: 600;
      }
      .nav .spacer {
        flex: 1;
      }
      .nav select {
        appearance: none;
        border: 1px solid #aaa;
        border-radius: 0;
        background: #fff;
        color: var(--ink);
        padding: 5px 28px 5px 10px;
        font: 12px var(--sans);
        letter-spacing: 0.3px;
        background-image:
          linear-gradient(45deg, transparent 50%, #111 50%),
          linear-gradient(135deg, #111 50%, transparent 50%);
        background-position:
          calc(100% - 13px) 10px,
          calc(100% - 9px) 10px;
        background-size:
          4px 4px,
          4px 4px;
        background-repeat: no-repeat;
      }
      .workspace {
        display: grid;
        grid-template-columns: minmax(420px, 46%) minmax(500px, 54%);
        height: calc(100vh - 72px);
        overflow: hidden;
      }
      .code-pane,
      .editorial-pane {
        min-width: 0;
        overflow: auto;
      }
      .code-pane {
        border-right: 1px solid var(--line);
        background: #fafafa;
      }
      .pane-inner {
        padding: 34px 38px 80px;
      }
      .code-pane .pane-inner {
        min-width: 620px;
      }
      .pane-label {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        margin-bottom: 20px;
        color: var(--muted);
        font-size: 12px;
        letter-spacing: 0.3px;
      }
      .pane-label strong {
        color: var(--ink);
        font-weight: 600;
      }
      main {
        max-width: 860px;
        padding: 56px 54px 120px;
      }
      h1,
      h2,
      h3 {
        color: var(--ink);
        line-height: 1.25;
      }
      h1 {
        margin: 0 0 42px;
        font-size: 34px;
        font-weight: 650;
        letter-spacing: -0.8px;
      }
      h2 {
        margin: 58px 0 20px;
        padding-bottom: 10px;
        border-bottom: 1px solid var(--line);
        font-size: 19px;
        font-weight: 650;
        letter-spacing: -0.15px;
      }
      h3 {
        margin: 32px 0 12px;
        font-size: 15px;
        font-weight: 650;
      }
      p {
        margin: 13px 0;
      }
      a {
        color: var(--ink);
        text-decoration-color: #aaa;
        text-underline-offset: 3px;
      }
      a:hover {
        text-decoration-color: var(--ink);
      }
      strong {
        font-weight: 650;
      }
      ul,
      ol {
        padding-left: 23px;
      }
      li {
        margin: 4px 0;
      }
      code {
        background: var(--soft);
        padding: 2px 5px;
        border-radius: 3px;
        font: 13px/1.6 var(--mono);
      }
      pre {
        margin: 22px 0;
        padding: 15px 17px;
        overflow: auto;
        border: 0;
        border-radius: 8px;
        background: var(--soft);
        color: var(--ink);
        font: 13px/1.7 var(--mono);
      }
      pre code {
        padding: 0;
        background: transparent;
      }
      .code-pane pre {
        margin: 0;
        padding: 0;
        border-radius: 0;
        background: transparent;
        overflow: visible;
        font: 13px/1.72 var(--mono);
        tab-size: 4;
      }
      .code-pane pre code.hljs {
        padding: 0;
        background: transparent;
      }
      blockquote {
        margin: 22px 0;
        padding: 1px 0 1px 18px;
        border-left: 2px solid #bbb;
        color: #555;
      }
      table {
        border-collapse: collapse;
        width: 100%;
        margin: 24px 0;
        font-size: 13px;
      }
      th,
      td {
        border-bottom: 1px solid var(--line);
        padding: 9px 12px;
        text-align: left;
      }
      th {
        color: #666;
        font-weight: 600;
      }
      tr:last-child td {
        border-bottom-color: #ccc;
      }
      mjx-container {
        color: var(--ink);
      }
      .loading {
        color: var(--muted);
        font-size: 13px;
      }

      @media (max-width: 720px) {
        .shell {
          width: min(100% - 30px, 1160px);
        }
        .nav {
          gap: 12px;
          overflow-x: auto;
        }
        .nav .optional {
          display: none;
        }
        .workspace {
          display: block;
          height: auto;
          overflow: visible;
        }
        .code-pane,
        .editorial-pane {
          overflow: visible;
        }
        .code-pane {
          border-right: 0;
          border-bottom: 1px solid var(--line);
        }
        .code-pane .pane-inner {
          min-width: 0;
          padding: 26px 20px 36px;
        }
        .code-pane pre {
          overflow-x: auto;
        }
        main {
          padding: 42px 20px 80px;
        }
        h1 {
          font-size: 28px;
        }
        table {
          display: block;
          overflow-x: auto;
        }
      }
    </style>
  </head>
  <body>
    <header class="shell nav">
      <span class="spacer"></span>
      <label for="editorial">problem</label>
      <select id="editorial" aria-label="Choose problem"></select>
      <select id="author" aria-label="Choose author" hidden></select>
    </header>
    <div class="workspace">
      <aside
        id="code-pane"
        class="code-pane solution-hidden"
        aria-label="Accepted C++ solution"
      >
        <div class="pane-inner">
          <div class="pane-label">
            <strong>accepted solution</strong>
            <span class="pane-actions">
              <span id="code-name">C++17</span>
              <button id="copy-code" class="copy-code" type="button" hidden>
                Copy
              </button>
              <button
                id="toggle-solution"
                class="reveal-code"
                type="button"
                aria-expanded="false"
              >
                Reveal solution
              </button>
            </span>
          </div>
          <pre id="solution-block" hidden><code id="source-code" class="language-cpp">Loading code…</code></pre>
        </div>
      </aside>
      <section class="editorial-pane" aria-label="Editorial explanation">
        <main id="content" class="loading">Loading editorial...</main>
      </section>
    </div>
    <script src="site-config.js?v=4"></script>
    <script src="api.js?v=4"></script>
    <script>
      const params = new URLSearchParams(location.search);
      const collection = (params.get("collection") || "cses").toLowerCase();
      const section = params.get("section") || "introductory";
      const picker = document.getElementById("editorial");
      const authorPicker = document.getElementById("author");
      const codePane = document.getElementById("code-pane");
      const solutionBlock = document.getElementById("solution-block");
      const toggleSolution = document.getElementById("toggle-solution");
      const copyCode = document.getElementById("copy-code");
      let published = [];

      function setSolutionVisible(visible) {
        codePane.classList.toggle("solution-hidden", !visible);
        solutionBlock.hidden = !visible;
        copyCode.hidden = !visible;
        toggleSolution.textContent = visible
          ? "Hide solution"
          : "Reveal solution";
        toggleSolution.setAttribute("aria-expanded", String(visible));
      }

      async function load() {
        const problemResult = await EditorialApi.request(
          `/api/problems?${new URLSearchParams({ collection, section })}`,
        );
        const problems = problemResult.items.filter(
          (problem) => Number(problem.published_count) > 0,
        );
        picker.replaceChildren(
          ...problems.map((item) => new Option(item.title, item.slug)),
        );
        const slug =
          params.get("slug") ||
          params.get("file")?.split("/").pop()?.replace(/\.md$/i, "") ||
          picker.options[0]?.value;
        if (!slug) throw new Error("This section has no published editorials.");
        picker.value = slug;
        picker.addEventListener("change", () => {
          location.search = new URLSearchParams({
            collection,
            section,
            slug: picker.value,
          });
        });

        const result = await EditorialApi.request(
          `/api/editorials?${new URLSearchParams({ collection, section, slug })}`,
        );
        published = result.editorials;
        authorPicker.replaceChildren(
          ...published.map(
            (item, index) =>
              new Option(
                published.length === 1
                  ? `by ${item.author.name}`
                  : item.author.name,
                String(index),
              ),
          ),
        );
        authorPicker.hidden = published.length < 2;
        authorPicker.addEventListener("change", renderEditorial);
        renderEditorial();
      }

      async function renderEditorial() {
        const selected = published[Number(authorPicker.value || 0)];
        if (!selected) return;
        document.getElementById("code-name").textContent = "C++17";
        const content = document.getElementById("content");
        content.innerHTML = marked.parse(selected.markdown);
        const embeddedHeading = [...content.querySelectorAll("h3")].find(
          (heading) =>
            heading.textContent.trim() === "Accepted C++17 implementation",
        );
        if (embeddedHeading) {
          const next = embeddedHeading.nextElementSibling;
          if (next?.tagName === "PRE") next.remove();
          embeddedHeading.remove();
        }
        content.classList.remove("loading");
        const source = document.getElementById("source-code");
        source.textContent =
          selected.solution_cpp || "// No C++ solution has been attached.";
        source.removeAttribute("data-highlighted");
        hljs.highlightElement(source);
        setSolutionVisible(false);
        document.title =
          document.querySelector("h1")?.textContent || document.title;
        await MathJax.typesetPromise();
      }

      toggleSolution.addEventListener("click", () =>
        setSolutionVisible(solutionBlock.hidden),
      );
      copyCode.addEventListener("click", async () => {
        await navigator.clipboard.writeText(
          document.getElementById("source-code").textContent,
        );
        copyCode.textContent = "Copied";
        setTimeout(() => {
          copyCode.textContent = "Copy";
        }, 1200);
      });
      setSolutionVisible(false);

      load().catch((error) => {
        const content = document.getElementById("content");
        content.className = "";
        content.textContent = error.message;
      });
    </script>
    <script src="shortcut.js"></script>
  </body>
</html>
