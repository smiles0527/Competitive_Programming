<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CP Editorials</title>
    <link rel="stylesheet" href="site.css?v=6" />
  </head>
  <body class="home-page">
    <div class="home-account" data-site-nav>
      <span class="site-identity" data-identity hidden></span>
      <button type="button" data-sign-in>Sign in</button>
      <button type="button" data-sign-out hidden>Sign out</button>
    </div>
    <main class="home-menu">
      <h1>CP Editorials</h1>
      <div class="home-actions">
        <a href="all.html">Find an editorial <span>→</span></a>
        <a href="edit.html">Write an editorial <span>→</span></a>
        <a href="manage.html" data-review-link hidden
          >Review submissions <span>→</span></a
        >
      </div>
    </main>
    <script src="site-config.js?v=6"></script>
    <script src="api.js?v=6"></script>
    <script src="site-nav.js?v=6"></script>
    <script>
      const params = new URLSearchParams(location.search);
      if (
        params.has("slug") ||
        params.has("editorial") ||
        params.has("file")
      )
        location.replace(`section.html?${params}${location.hash}`);
      else if (params.has("collection") || params.has("section"))
        location.replace(`all.html?${params}${location.hash}`);
    </script>
  </body>
</html>
