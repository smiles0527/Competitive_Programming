<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Competitive Programming Editorials</title>
  <style>
    :root { --ink:#111; --line:#ddd; --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif; }
    * { box-sizing: border-box; }
    html, body { width: 100%; height: 100%; margin: 0; }
    body { display: grid; place-items: center; color: var(--ink); background: #fff; font-family: var(--sans); }
    main { width: min(520px, calc(100% - 32px)); }
    h1 { margin: 0 0 24px; font-size: 24px; letter-spacing: -.4px; }
    .buttons { display: grid; gap: 10px; }
    a { display: flex; align-items: center; justify-content: space-between; min-height: 64px; padding: 0 20px; border: 1px solid var(--line); color: var(--ink); background: #fff; font-size: 16px; font-weight: 600; text-decoration: none; }
    a:hover { color: #fff; background: var(--ink); border-color: var(--ink); }
  </style>
</head>
<body>
  <main>
    <h1>Competitive Programming Editorials</h1>
    <div class="buttons">
      <a href="browse.html"><span>Browse editorials</span><span>→</span></a>
      <a href="all.html"><span>View all</span><span>→</span></a>
      <a id="manage" href="manage.html"><span>Manage editorials</span><span>→</span></a>
    </div>
  </main>
  <script>
    const params = new URLSearchParams(location.search);
    if (params.has('collection') || params.has('section') || params.has('editorial')) location.replace(`browse.html?${params}`);
    document.getElementById('manage').hidden = !['127.0.0.1', 'localhost'].includes(location.hostname);
  </script>
</body>
</html>
