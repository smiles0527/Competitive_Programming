<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Opening CP Editorials…</title>
  </head>
  <body>
    <p><a id="destination" href="index.html">Open CP Editorials</a></p>
    <script>
      const params = new URLSearchParams(location.search);
      if (params.has("editorial") && !params.has("slug"))
        params.set("slug", params.get("editorial"));
      const reader =
        params.has("slug") || params.has("file") || params.has("section");
      const target = `${reader ? "section.html" : "all.html"}${
        params.size ? `?${params}` : ""
      }${location.hash}`;
      document.getElementById("destination").href = target;
      location.replace(target);
    </script>
  </body>
</html>
